# Description:                                                   #
# This is a Hugging Face configuration file for distributed      #
# training setup using multiple GPUs on a local machine.         #
##################################################################
compute_environment: LOCAL_MACHINE
debug: false
distributed_type: MULTI_GPU
downcast_bf16: 'no'
enable_cpu_affinity: false
gpu_ids: all
main_training_function: main
mixed_precision: fp16
rdzv_backend: c10d
same_network: true
tpu_env: []
tpu_use_cluster: false
tpu_use_sudo: false
use_cpu: false