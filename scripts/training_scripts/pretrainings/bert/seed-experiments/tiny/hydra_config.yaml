###############################################################################
# Author: Mohammad Mostafanejad                                               #
# Date: March 2025                                                            #
# Description:                                                                #
# This hydra configuration YAML file is required by the training script       #
# to run.                                                                     #
###############################################################################
dirs:
  cache_dir: ${oc.env:TMPFS}/${model.model_name}/tmp
data:
  date: ${now:%Y-%m-%d_%H-%M-%S}
  dataset_path: ${oc.env:TMPFS}/pubchem04182025_isostereomers_tokenized
model:
  model_name: ???
  processing_class: "molssiai-hub/gen-mlm-cismi-bert-wordpiece-pubchem04182025"
  token: ${oc.env:HF_TOKEN}
  max_position_embeddings: 512
  hidden_size: 128
  hidden_act: "gelu"
  initializer_range: 0.02
  hidden_dropout_prob: 0.1
  num_attention_heads: 2
  type_vocab_size: 2
  num_hidden_layers: 2
  intermediate_size: 512
  attention_probs_dropout_prob: 0.1
trainer:
  run_name: ${wandb.wandb_name}
  mlm_probability: 0.15
  output_dir: ${dirs.cache_dir}/${model.model_name}
  log_dir: ${dirs.cache_dir}/${model.model_name}/runs
  resume_from_checkpoint: False
  overwrite_output_dir: False
  per_device_train_batch_size: 64
  per_device_eval_batch_size: 32
  learning_rate: 1e-4
  weight_decay: 0.01
  num_train_epochs: 5
  lr_scheduler_type: "linear"
  eval_strategy: "epoch"
  save_strategy: "epoch"
  logging_strategy: "steps"
  logging_steps: 200
  early_stopping_patience: 3
  early_stopping_threshold: 0.001
  metric_for_best_model: "eval_loss"
  seed: 1234
  data_seed: 1234
  fp16: True
  ddp_backend: "nccl"
  dataloader_num_workers: 4
  dataloader_pin_memory: False
  dataloader_persistent_workers: False
  dataloader_prefetch_factor: 1
  gradient_checkpointing: False
  gradient_accumulation_steps: 1
  batch_eval_metrics: True
  eval_accumulation_steps: 300
  torch_empty_cache_steps: 300
  push_to_hub: False
  greater_is_better: False
  # eval_strategy: "steps"
  # save_strategy: "steps"
  eval_steps: null
  save_steps: null
wandb:
  wandb_project: bertology
  wandb_entity: molssi-bert
  wandb_username: "sina-mostafanejad"
  wandb_user_email: "sina.mostafanejad@gmail.com"
  wandb_name: ${model.model_name}-ms-${trainer.seed}-ds-${trainer.data_seed}
  wandb_job_name: ${model.model_name}
  wandb_job_type: "pre-training"
  wandb_run_group: "pre-train-seeds"
  wandb_tags: manuscript,pre-training
  wandb_dir: ${oc.env:TMPFS}/${model.model_name}/wandb
  wandb_cache_dir: ${wandb.wandb_dir}/wandb_cache
  wandb_data_dir: ${wandb.wandb_dir}/data_stage
  wandb_artifact_dir: ${wandb.wandb_dir}/artifacts
  wandb_api_key: ${oc.env:WANDB_API_KEY}
  wandb_watch: "all"
  wandb_log_model: "checkpoint"
  wandb_run_id: null
  wandb_resume: False